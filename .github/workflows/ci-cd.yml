name: CI/CD Docker Node API

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t my-node-api .

    - name: Run Container
      run: docker run -d -p 3000:3000 my-node-api
