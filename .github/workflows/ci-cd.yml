name: CI/CD Docker Node API

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-api-ci-cd .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/node-api-ci-cd

    - name: Run Container
      run: docker run -d -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/node-api-ci-cd
